<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Crediti e Risorse</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: #f7f7f7;
            color: #333;
            margin: 0;
            padding: 0;
        }

        .credits-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 24px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 8px;
        }

        p {
            margin-bottom: 24px;
            color: #555;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            margin-bottom: 12px;
        }

        a {
            color: #0066cc;
            text-decoration: none;
            font-weight: 500;
        }

        a:hover {
            text-decoration: underline;
        }

        .note {
            margin-top: 32px;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>

<body>
    <div class="credits-container">
        <h1>Crediti e Risorse</h1>
        <p>Di seguito sono elencate le risorse esterne utilizzate all’interno del sito.</p>

        <ul>
            <li>
                <a href="https://example.com" target="_blank" rel="noopener">
                    Nome Risorsa 1 – descrizione opzionale
                </a>
            </li>
            <li>
                <a href="https://example.com" target="_blank" rel="noopener">
                    Nome Risorsa 2
                </a>
            </li>
            <li>
                <a href="https://example.com" target="_blank" rel="noopener">
                    Nome Risorsa 3
                </a>
            </li>
            <!-- Aggiungi o rimuovi <li> secondo necessità -->
        </ul>

        <div class="note">
            Tutti i marchi e contenuti appartengono ai rispettivi proprietari.
        </div>
    </div>
</body>
</html>
